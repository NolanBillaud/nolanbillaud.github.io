<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Curriculum Vitae de [Prénom Nom] — Étudiant en BUT Science des Données" />
  <title>CV — Portfolio BUT SD</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* En-tête de page avec action */
    .cv-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    /* Image du CV */
    .cv-image-frame {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card-2);
      text-align: center;
    }

    .cv-image-frame img {
      width: 100%;
      max-width: 800px;
      display: block;
      margin: 0 auto;
    }

    /* Note sous l'image */
    .cv-note {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <button class="hamburger" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="sidebar">☰</button>

  <div class="site-wrapper">

    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navigation principale">
      <p class="sidebar__logo"><span>{ </span>SD Portfolio<span> }</span></p>
      <p class="sidebar__tagline">BUT Science des Données</p>
      <nav>
        <ul>
          <li><a href="index.html"><span class="nav-icon" aria-hidden="true">🏠</span> Accueil</a></li>
          <li><a href="cv.html"><span class="nav-icon" aria-hidden="true">📄</span> Curriculum Vitae</a></li>
          <li><a href="projets.html"><span class="nav-icon" aria-hidden="true">📊</span> Projets</a></li>
          <li><a href="apropos.html"><span class="nav-icon" aria-hidden="true">🙋</span> À propos</a></li>
          <li><a href="contact.html"><span class="nav-icon" aria-hidden="true">✉️</span> Contact</a></li>
        </ul>
      </nav>
      <p class="sidebar__footer">© 2025 Nolan Billaud</p>
    </aside>

    <main class="main-content" id="main">

      <header class="page-header">
        <p class="eyebrow">Mon parcours</p>
        <h1>Curriculum Vitae</h1>
        <p>Consultez ou téléchargez mon CV.</p>
      </header>

      <div class="cv-actions">
        <a href="assets/cv Nolan.pdf" class="btn btn--primary" download>
          ⬇ Télécharger le CV (PDF)
        </a>
      </div>

      <!-- Image du CV (aperçu) -->
      <div class="cv-image-frame">
        <img src="assets/cv Nolan.jpg" alt="Curriculum Vitae de [Prénom Nom]" />
      </div>


    </main>
  </div>

  <script src="js/nav.js"></script>
</body>
</html>
